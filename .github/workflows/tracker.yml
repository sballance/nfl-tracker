name: NFL Transactions & Injury Tracker

on:
  schedule:
    - cron: '0 * * * *'  # runs every hour
  workflow_dispatch:  # allows you to trigger it manually from GitHub

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run transaction tracker
        env:
          NFL_WEBHOOK: ${{ secrets.NFL_WEBHOOK }}
          SEAHAWKS_WEBHOOK: ${{ secrets.SEAHAWKS_WEBHOOK }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python transactions_tracker.py

      - name: Run injury tracker
        env:
          INJURIES_WEBHOOK: ${{ secrets.INJURIES_WEBHOOK }}
          SEAHAWKS_WEBHOOK: ${{ secrets.SEAHAWKS_WEBHOOK }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python injuries_tracker.py
